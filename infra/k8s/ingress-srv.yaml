apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-service
  annotations:
    nginx.ingress.kubernetes.io/use-regex: 'true'
spec:
  ingressClassName: nginx
  rules:
    - host: smartproctor.dev
      http:
        paths:
          - path: /api/users/?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: auth-srv
                port:
                  number: 3000
          - path: /api/exams/?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: exam-srv
                port:
                  number: 3001
          - path: /api/query/?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: query-srv
                port:
                  number: 3002
          - path: /?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: client-srv
                port:
                  number: 80
    - host: 494a9d6e096e.ngrok-free.app
      http:
        paths:
          - path: /api/users/?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: auth-srv
                port:
                  number: 3000
          - path: /api/exams/?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: exam-srv
                port:
                  number: 3000
          - path: /api/query/?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: query-srv
                port:
                  number: 3001
          - path: /?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: client-srv
                port:
                  number: 80
